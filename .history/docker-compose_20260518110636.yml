version: '3.8'

services:
  redis_cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis_cache:6379/0
    depends_on:
      - redis_cache
    restart: always
    volumes:
      - ./backend:/app 

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: always
    volumes:
      - ./frontend:/app