services:
  redis_cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    # ÇÖZÜM: --reload kaldırıldı. Artık tek bir stabil process çalışacak.
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"            # Windows üzerinden erişebilmek için portu açtık
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis_cache:6379/0  # Docker iç ağından redis_cache adına gider
    depends_on:
      - redis_cache
    restart: always
    volumes:
      - .:/app                 # Bütün kodları içeri bağla

  frontend:
    build: 
      context: .               # Dockerfile'ı ana klasörde ara
      dockerfile: Dockerfile
    working_dir: /app/frontend # Tıpkı terminalde "cd frontend" yapmak gibi!
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8525:8501"            # Tarayıcıdan erişeceğimiz port (8525 -> container içi 8501)
    environment:
      - BACKEND_URL=http://backend:8000  # Docker iç ağından backend adına gider
    depends_on:
      - backend
    restart: on-failure
    volumes:
      - .:/app